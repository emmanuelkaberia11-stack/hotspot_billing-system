services:
  # WiFi Billing API Service
  - type: web
    name: wifi-billing-api
    runtime: node
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: wifi-billing-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: MPESA_ENABLED
        value: "true"
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: MIKROTIK_ENABLED
        sync: false
      - key: MIKROTIK_HOST
        sync: false
      - key: MIKROTIK_USER
        sync: false
      - key: MIKROTIK_PASSWORD
        sync: false
      - key: MIKROTIK_PORT
        sync: false
      - key: LOAN_WIFI_DURATION_HOURS
        value: "1"

  # WiFi Billing Frontend Service
  - type: web
    name: wifi-billing-frontend
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        fromService:
          type: web
          name: wifi-billing-api
          property: host

# PostgreSQL Database
databases:
  - name: wifi-billing-db
    ipAllowList: []  # Only accessible by other services in this project
    plan: free       # Keep on the free tier to start

# Shared Environment Variable Groups
envVarGroups:
  - name: production-shared-config
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOAN_WIFI_DURATION_HOURS
        value: "1"
